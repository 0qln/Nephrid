[package]
name = "nephrid"
version = "26.4.4+1e7b349"
edition = "2024"

[features]
cpu = ["engine/nn-backend-ndarray"]
gpu = ["engine/nn-backend-cuda"]
mcts-nn = ["engine/mcts-nn"]
mcts-hce = ["engine/mcts-hce"]
mcts-pure = ["engine/mcts-pure"]

default = ["cpu", "mcts-hce"]

[dependencies]
engine = { version = "*", path = "../engine", default-features = false }
regex = "1.12.3"

[dev-dependencies]
assert_cmd = "2.0"
ntest = "0.9.5"
