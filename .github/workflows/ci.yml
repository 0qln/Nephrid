name: "Nephrid CI/CD"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install Nix
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # 2. Add Nix Cache (Highly recommended to speed up evaluations/builds)
      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      # 3. Lint with Clippy (Fails the build if there are warnings)
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        shell: nix develop . --command bash -e {0}

      # 4. Run tests natively inside the Nix devshell
      - name: Run Unit Tests
        run: cargo test --workspace --verbose
        shell: nix develop . --command bash -e {0}

      - name: Dry Run Benchmarks
        run: cargo test --benches --workspace --verbose
        shell: nix develop . --command bash -e {0}

  versioning:
    name: Versioning
    # This job needs to wait for important jobs (e.g., testing and linting) to complete.
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Generate version number
        run: |
          DATE=$(date +'%Y.%-m.%-d')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          VERSION="${DATE#20}+$COMMIT_SHA"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Announce CI/CD
        run: echo "Running CI/CD for Nephrid Version ${{ env.VERSION }}"

      - name: Bump engine crate version
        uses: thomaseizinger/set-crate-version@master
        with:
          version: ${{ env.VERSION }}
          manifest: ./engine/Cargo.toml

      - name: Bump nephrid crate version
        uses: thomaseizinger/set-crate-version@master
        with:
          version: ${{ env.VERSION }}
          manifest: ./nephrid/Cargo.toml

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Bump up crate version to ${{ env.VERSION }}
          tagging_message: ${{ env.VERSION }}
